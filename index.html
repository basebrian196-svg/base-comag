<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base de Conhecimento Comag</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://nlfidalnxpqlnfvlsxph.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sZmlkYWxueHBxbG5mdmxzeHBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNTY2NzgsImV4cCI6MjA5MTYzMjY3OH0.gmVsY1BKGIcLEcjG7KYqT4KcDtbZ2N8zbzL3yi-6ZSg';
        
        // CORREÇÃO AQUI: Mudamos o nome da variável para 'supabaseClient' para evitar o erro anterior
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>

    <style>
        :root { --primary-color: #2c3e50; --accent-color: #d35400; --bg-color: #f4f7f6; --text-color: #333; --danger-color: #c0392b; --success-color: #27ae60; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-admin { background: var(--primary-color); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-admin:hover { background: var(--accent-color); }
        .search-wrapper { position: relative; max-width: 700px; margin: 0 auto 30px; }
        #search-input { width: 100%; padding: 15px 25px; border-radius: 30px; border: 2px solid #ddd; font-size: 18px; outline: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        #autocomplete-list { width: 100%; background: white; border-radius: 15px; box-shadow: 0 5px 10px rgba(0,0,0,0.1); z-index: 1000; max-height: 250px; overflow-y: auto; margin-top: 5px; }
        .autocomplete-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #eee; }
        .autocomplete-item:hover { background-color: #f1f1f1; }
        .table-container { background: white; border-radius: 12px; overflow-x: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background-color: var(--primary-color); color: white; padding: 15px; text-align: left; font-size: 13px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; vertical-align: top; white-space: pre-wrap; word-wrap: break-word; }
        .highlight { background-color: #ffeb3b; font-weight: bold; padding: 0 2px; }
        .admin-actions { margin-bottom: 20px; display: flex; gap: 15px; background: #fff; padding: 15px; border-radius: 8px; }
        .btn-add { background: var(--success-color); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--accent-color); color: white; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .cell-edit { width: 100%; min-height: 60px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; font-size: 13px; resize: vertical; box-sizing: border-box; }
        .btn-del { background: none; border: none; color: var(--danger-color); cursor: pointer; font-size: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="page-user">
        <div class="header-nav">
            <h1>Base de Conhecimento Comag</h1>
            <button class="btn-admin" onclick="acessarAdmin()">Acesso Restrito</button>
        </div>

        <div class="search-wrapper">
            <input type="text" id="search-input" placeholder="Pesquisar produto, marca ou aplicação..." autocomplete="off">
            <div id="autocomplete-list"></div>
        </div>

        <div class="table-container">
            <table id="results-table" style="display: none;">
                <thead>
                    <tr>
                        <th style="width: 20%;">Tipo</th>
                        <th style="width: 20%;">Marca</th>
                        <th style="width: 30%;">Aplicação</th>
                        <th style="width: 30%;">Resumo Técnico</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="page-admin" class="hidden">
        <div class="header-nav">
            <h1>Painel Administrativo</h1>
            <button class="btn-admin" onclick="voltarUsuario()">Sair do Admin</button>
        </div>
        <div class="admin-actions">
            <button class="btn-add" onclick="adicionarNovaLinha()">+ Adicionar Novo Item</button>
            <button class="btn-save" onclick="salvarAlteracoes()">💾 Salvar na Nuvem</button>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 40px;">#</th>
                        <th style="width: 50px;">Ação</th>
                        <th>Tipo</th>
                        <th>Marca</th>
                        <th>Aplicação</th>
                        <th>Resumo</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
let database = [];

// CARREGAR DADOS (Ajustado para o nome da sua tabela)
async function carregarDados() {
    const { data, error } = await supabaseClient
        .from('Basebriancomag') 
        .select('*');

    if (error) {
        console.error("Erro:", error.message);
    } else {
        database = data || [];
        renderResults(document.getElementById('search-input').value.toLowerCase());
    }
}

carregarDados();

// SALVAR DADOS
async function salvarAlteracoes() {
    if (prompt("Senha ADM:") === "1752") {
        const edits = document.querySelectorAll('.cell-edit');
        const listaParaSalvar = [];
        const indicesVistos = new Set();

        edits.forEach(el => {
            const i = el.dataset.index;
            if (!indicesVistos.has(i)) {
                indicesVistos.add(i);
                listaParaSalvar.push({
                    tipo: document.querySelector(`.cell-edit[data-index="${i}"][data-field="tipo"]`).value,
                    marca: document.querySelector(`.cell-edit[data-index="${i}"][data-field="marca"]`).value,
                    aplicacao: document.querySelector(`.cell-edit[data-index="${i}"][data-field="aplicacao"]`).value,
                    resumo: document.querySelector(`.cell-edit[data-index="${i}"][data-field="resumo"]`).value
                });
            }
        });

        const { error: errorDel } = await supabaseClient.from('Basebriancomag').delete().neq('id', 0);
        const { error: errorIns } = await supabaseClient.from('Basebriancomag').insert(listaParaSalvar);

        if (errorIns) alert("Erro: " + errorIns.message);
        else { alert("✅ Salvo com sucesso!"); carregarDados(); }
    }
}

// INTERFACE
function acessarAdmin() {
    if (prompt("Código:") === "1752") {
        document.getElementById('page-user').classList.add('hidden');
        document.getElementById('page-admin').classList.remove('hidden');
        renderAdminTable();
    }
}

function voltarUsuario() {
    document.getElementById('page-admin').classList.add('hidden');
    document.getElementById('page-user').classList.remove('hidden');
}

const searchInput = document.getElementById('search-input');
const tableBody = document.getElementById('table-body');
const resultsTable = document.getElementById('results-table');

searchInput.addEventListener('input', function() {
    renderResults(this.value.toLowerCase());
});

function renderResults(query) {
    const matches = database.filter(item => 
        Object.values(item).some(v => v && v.toString().toLowerCase().includes(query))
    );

    if (query && matches.length > 0) {
        resultsTable.style.display = 'table';
        tableBody.innerHTML = matches.map(item => `
            <tr>
                <td>${highlight(item.tipo, query)}</td>
                <td>${highlight(item.marca, query)}</td>
                <td>${highlight(item.aplicacao, query)}</td>
                <td>${highlight(item.resumo, query)}</td>
            </tr>`).join('');
    } else { resultsTable.style.display = 'none'; }
}

function highlight(text, q) { 
    if(!q || !text) return text; 
    return text.replace(new RegExp(`(${q})`, 'gi'), '<span class="highlight">$1</span>'); 
}

function renderAdminTable() {
    const adminBody = document.getElementById('admin-table-body');
    adminBody.innerHTML = database.map((item, index) => `
        <tr>
            <td>${index + 1}</td>
            <td><button class="btn-del" onclick="deletarLinha(${index})">🗑️</button></td>
            <td><textarea class="cell-edit" data-field="tipo" data-index="${index}">${item.tipo || ''}</textarea></td>
            <td><textarea class="cell-edit" data-field="marca" data-index="${index}">${item.marca || ''}</textarea></td>
            <td><textarea class="cell-edit" data-field="aplicacao" data-index="${index}">${item.aplicacao || ''}</textarea></td>
            <td><textarea class="cell-edit" data-field="resumo" data-index="${index}">${item.resumo || ''}</textarea></td>
        </tr>`).join('');
}

function adicionarNovaLinha() { 
    database.unshift({ tipo: "", marca: "", aplicacao: "", resumo: "" }); 
    renderAdminTable(); 
}

function deletarLinha(index) {
    database.splice(index, 1);
    renderAdminTable();
}
</script>
</body>
</html>
